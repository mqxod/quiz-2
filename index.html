<!DOCTYPE html>
<html>
<head>
  <title>JavaScript Can Change Images</title>
</head>
<body bgcolor="#f0f0f0">

<br><br>

<center>

  <font face="Georgia" size="6" color="#333333">
    <b>JavaScript Can Change Images</b>
  </font>

  <br><br>

  <table border="4" bordercolor="#444444" cellpadding="15" bgcolor="#ffffff">
    <tr>
      <td align="center">

        <img id="myImage"
             onclick="changeImage()"
             src="image1.jpeg"
             width="250"
             height="300"
             style="cursor:pointer;"
             border="3"
             alt="Click to change image">

      </td>
    </tr>
    <tr>
      <td align="center" bgcolor="#333333">
        <font face="Georgia" size="4" color="#ffffff">
          &#128247; Click the image to toggle
        </font>
      </td>
    </tr>
  </table>

  <br>

  <table border="2" bordercolor="#888888" cellpadding="8" bgcolor="#ffffff">
    <tr>
      <td>
        <font face="Arial" size="3" color="#555555">
          &nbsp;&nbsp; Click the image above to switch between two pictures &nbsp;&nbsp;
        </font>
      </td>
    </tr>
  </table>

</center>

<script>
  function changeImage() {
    var image = document.getElementById('myImage');
    if (image.src.match("image1")) {
      image.src = "image2.jpeg";
    } else {
      image.src = "image1.jpeg";
    }
  }
</script>

</body>
</html>
